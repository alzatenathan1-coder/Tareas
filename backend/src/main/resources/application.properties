# ============================================
# Taskscape - Application Configuration
# ============================================

# --- MySQL Database Connection ---
spring.datasource.url=jdbc:mysql://localhost:3306/taskscape?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# "update" = auto-create/update tables based on entities (good for dev, NOT for production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Server ---
server.port=8080

# --- Data Initialization ---
# "always" = run data.sql on every startup (inserts sample data)
spring.sql.init.mode=always
# Don't fail if data already exists (INSERT errors on duplicate keys are OK)
spring.sql.init.continue-on-error=true
